<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ZM Private Chat</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}body{background:#081120;color:#fff;height:100vh}.container{display:flex;height:100vh}.sidebar{width:280px;background:#111827;border-right:1px solid #334155;padding:20px;overflow:auto}.sidebar h2{margin-bottom:15px}.user{padding:12px;background:#1f2937;border-radius:10px;margin-bottom:10px;cursor:pointer}.user:hover,.active{background:#2563eb}.main{flex:1;display:flex;flex-direction:column}.header{height:70px;background:#111827;border-bottom:1px solid #334155;display:flex;align-items:center;padding:0 20px;font-size:22px}.chatbox{flex:1;padding:20px;overflow:auto}.msg{padding:12px;border-radius:12px;max-width:70%;margin:10px 0}.me{background:#2563eb;margin-left:auto}.other{background:#1f2937}.bottom{display:flex;padding:15px;background:#111827}.bottom input{flex:1;padding:12px;border:none;border-radius:10px}.bottom button{margin-left:10px;padding:12px 20px;border:none;border-radius:10px;background:#2563eb;color:#fff}@media(max-width:768px){.container{display:block}.sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid #334155}}</style></head><body><div class="container"><div class="sidebar"><h2>👥 Users</h2><div class="user active">🟢 a</div><div class="user">🟢 b</div><div class="user">🟢 c</div><div class="user">🟢 d</div><div class="user">🟢 e</div></div><div class="main"><div class="header"><span id="chatUser">💬 ZM Private Chat</span><span style="margin-left:auto;color:#22c55e;font-size:14px;">🟢 Online</span></div><div class="chatbox" id="chatbox"><div class="msg other">Welcome to ZM Secure Chat</div></div><div class="bottom"><input id="message" placeholder="Type Message..."><button onclick="send()">➤</button></div></div></div><script src="chat.js"></script></body></html>
