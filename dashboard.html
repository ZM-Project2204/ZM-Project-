<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZM Project Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020617;
color:white;
padding:20px;
}

.header{
background:#111827;
padding:20px;
border-radius:15px;
text-align:center;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#334155;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}

.user{
background:#334155;
padding:10px;
margin-top:10px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="header">

<h1>👑 ZM Admin Dashboard</h1>

<p>Manage Your Users</p>

</div>

<div class="card">

<h2>Create User</h2>

<input id="username" placeholder="Username">

<input id="password" placeholder="Password">

<button onclick="addUser()">Add User</button>

</div>

<div class="card">

<h2>User List</h2>

<div id="list"></div>

</div>

<script>

function loadUsers(){

let users=JSON.parse(localStorage.getItem("users"))||[];

let html="";

users.forEach((x,i)=>{

html+=`
<div class="user">
${i+1}. ${x.username}
</div>
`;

});

document.getElementById("list").innerHTML=html;

}

function addUser(){

let u=document.getElementById("username").value;

let p=document.getElementById("password").value;

if(u==""||p==""){

alert("Fill all fields");

return;

}

let users=JSON.parse(localStorage.getItem("users"))||[];

if(users.length>=5){

alert("Maximum 5 Users Allowed");

return;

}

users.push({

username:u,

password:p

});

localStorage.setItem("users",JSON.stringify(users));

document.getElementById("username").value="";

document.getElementById("password").value="";

loadUsers();

}

loadUsers();

</script>

</body>
</html>
