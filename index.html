<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZM Project</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#020617,#0f172a,#1e293b);
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:350px;
height:350px;
background:#2563eb55;
border-radius:50%;
top:-100px;
left:-100px;
filter:blur(120px);
}

body::after{
content:"";
position:absolute;
width:300px;
height:300px;
background:#06b6d455;
border-radius:50%;
bottom:-100px;
right:-100px;
filter:blur(120px);
}

.card{

width:360px;

padding:35px;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border-radius:22px;

box-shadow:0 10px 40px rgba(0,0,0,.5);

z-index:10;

text-align:center;

}

.logo{

font-size:50px;

margin-bottom:10px;

}

h1{

color:white;

font-size:30px;

letter-spacing:1px;

}

p{

color:#94a3b8;

margin-top:8px;

margin-bottom:25px;

font-size:14px;

}

input{

width:100%;

padding:14px;

margin-top:15px;

background:#0f172a;

border:1px solid #334155;

border-radius:12px;

color:white;

font-size:15px;

transition:.3s;

}

input:focus{

border:1px solid #3b82f6;

box-shadow:0 0 15px #2563eb55;

outline:none;

}

button{

width:100%;

padding:14px;

margin-top:20px;

background:linear-gradient(90deg,#2563eb,#3b82f6);

border:none;

border-radius:12px;

font-size:16px;

color:white;

cursor:pointer;

transition:.3s;

font-weight:bold;

}

button:hover{

transform:translateY(-2px);

box-shadow:0 0 20px #2563eb88;

}

#error{

margin-top:15px;

color:#ff4d4d;

font-size:14px;

}

.footer{

margin-top:25px;

color:#64748b;

font-size:12px;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">🔒</div>

<h1>ZM Project</h1>

<p>Secure Communication Portal</p>

<input id="user" placeholder="Admin Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<div id="error"></div>

<div class="footer">
Powered by ZM Secure System v2.0
</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
